name: Update STUN servers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      STUN_SOURCE_URL: ${{ vars.STUN_SOURCE_URL }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Refresh generated STUN files
        run: npm run update:stun-servers

      - name: Create pull request for STUN updates
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(frontend): refresh STUN server list"
          title: "chore(frontend): refresh STUN server list"
          body: |
            Automated update for the generated STUN server files.

            Source: `${{ vars.STUN_SOURCE_URL || 'default upstream list' }}`
          branch: automation/update-stun-servers
          delete-branch: true
